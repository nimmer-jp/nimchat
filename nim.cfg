# Basolato + Crown: httpbeast バックエンド（このリポジトリは v0.15.0 固定）
#
# 先に pkgcache の v0.15.0 を通す。これが無いと ~/.nimble/pkgs2 の basolato-0.16.x が先に解決され、
# Nim 2.2 + 0.16 の createResponse / GC-safety エラーになる（nimble install が通っても crown dev は別経路）。
-d:httpbeast
-d:ssl
--path:"$home/.nimble/pkgcache/githubcom_itsumurahnimbasolato_#v0.15.0/src"
--path:"."
--nimcache:"./nimcache"